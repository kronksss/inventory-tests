name: CI/CD Pipeline для инвентаря игрока

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: Unit тесты (Jest)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/

  # ============================================
  # JOB 2: API тесты (Cucumber)
  # ============================================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      
      - name: Run API tests
        run: npm run test:api
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-node-${{ matrix.node-version }}
          path: |
            report.html
            allure-results/

  # ============================================
  # JOB 3: UI тесты (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        browser: [chromium]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      
      - name: Run UI tests
        run: npm run test:ui -- --project=${{ matrix.browser }}
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/

  # ============================================
  # JOB 4: Проверка общего статуса
  # ============================================
  check-status:
    name: Overall Status
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    
    steps:
      - name: Check all tests passed
        run: |
          echo "========================================="
          echo "📊 Результаты тестирования"
          echo "========================================="
          
          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "✅ Unit tests: PASSED"
          else
            echo "❌ Unit tests: FAILED"
          fi
          
          if [ "${{ needs.api-tests.result }}" = "success" ]; then
            echo "✅ API tests: PASSED"
          else
            echo "❌ API tests: FAILED"
          fi
          
          if [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "✅ UI tests: PASSED"
          else
            echo "❌ UI tests: FAILED"
          fi
          
          echo "========================================="
          
          if [ "${{ needs.unit-tests.result }}" = "success" ] && \
             [ "${{ needs.api-tests.result }}" = "success" ] && \
             [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "🎉 Все тесты пройдены успешно!"
            exit 0
          else
            echo "💥 Некоторые тесты не прошли"
            exit 1
          fi