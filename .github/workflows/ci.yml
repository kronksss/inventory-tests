name: CI/CD Pipeline для инвентаря игрока

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-node-${{ matrix.node-version }}
          path: coverage/

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      
      - name: Run API tests
        run: npm run test:api
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-node-${{ matrix.node-version }}
          path: report.html

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        browser: [chromium]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      
      - name: Run UI tests
        run: npm run test:ui
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  check-status:
    name: Overall Status
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    
    steps:
      - name: Check all tests passed
        run: |
          echo "========================================="
          echo "📊 Результаты тестирования"
          echo "========================================="
          
          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "✅ Unit tests: PASSED"
          else
            echo "❌ Unit tests: FAILED"
          fi
          
          if [ "${{ needs.api-tests.result }}" = "success" ]; then
            echo "✅ API tests: PASSED"
          else
            echo "❌ API tests: FAILED"
          fi
          
          if [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "✅ UI tests: PASSED"
          else
            echo "❌ UI tests: FAILED"
          fi
          
          echo "========================================="
          
          if [ "${{ needs.unit-tests.result }}" = "success" ] && \
             [ "${{ needs.api-tests.result }}" = "success" ] && \
             [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo "🎉 Все тесты пройдены успешно!"
          else
            echo "💥 Некоторые тесты не прошли"
            exit 1
          fi

  telegram-notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [check-status]
    if: always()
    
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.check-status.result }}" = "success" ]; then
            STATUS="✅ PASSED"
            EMOJI="✅"
            MESSAGE="Все тесты пройдены успешно!"
          else
            STATUS="❌ FAILED"
            EMOJI="❌"
            MESSAGE="Некоторые тесты не прошли!"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${EMOJI} CI/CD Pipeline ${STATUS}%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A👤 Author: ${{ github.actor }}%0A%0A📊 Result: ${MESSAGE}%0A%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"